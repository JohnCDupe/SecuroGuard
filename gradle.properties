# SecuroGuard build properties
# See README.md "Supported versions" for rationale.

# The release version is single-sourced here: bumping it (e.g. to 0.1.0-rc.1)
# updates the core/sentinel artifact versions AND the Fabric mod version.
group = com.securoguard
version = 0.1.0-SNAPSHOT

# --- Shared dependency versions ---
gsonVersion = 2.11.0
junitVersion = 5.11.3

# --- Minecraft / Fabric toolchain (fabric module only) ---
# Selected 2026-07 from official Fabric meta APIs. See README.
minecraftVersion = 1.21.11
yarnMappings = 1.21.11+build.6
loaderVersion = 0.19.3
fabricApiVersion = 0.141.4+1.21.11
modmenuVersion = 17.0.0

# Fabric mod metadata (the mod version is derived from `version` above)
modId = securoguard

org.gradle.jvmargs = -Xmx2G
org.gradle.parallel = true
